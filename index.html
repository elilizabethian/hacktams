<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>Pochita — Your Study Buddy 🐣</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="left">
            <div class="scene" id="scene">

                <!-- PET -->
                <div class="pet-wrap">
                    <div class="pet" id="pet" onclick="petTap()"></div>
                </div>

            </div>
        </div>
        <div class="right">
            <div class="panel">
                <div class="panel-main">
                    <!-- STATS -->
                    <div class="stats">
                        <div class="stat-row">
                            <div class="stat-icon">🍪</div>
                            <div class="stat-label">Hunger</div>
                            <div class="bar-track"><div class="bar-fill hunger" id="bar-hunger" style="width:60%"></div></div>
                            <div class="stat-val" id="val-hunger">60</div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-icon">💖</div>
                            <div class="stat-label">Happy</div>
                            <div class="bar-track"><div class="bar-fill happy" id="bar-happy" style="width:75%"></div></div>
                            <div class="stat-val" id="val-happy">75</div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-icon">📚</div>
                            <div class="stat-label">Focus</div>
                            <div class="bar-track"><div class="bar-fill focus" id="bar-focus" style="width:50%"></div></div>
                            <div class="stat-val" id="val-focus">50</div>
                        </div>
                    </div>

                    <!-- ACTIONS -->
                    <div class="actions">
                        <button class="action-btn btn-feed"  onclick="doAction('feed')">🍪 Feed</button>
                        <button class="action-btn btn-play"  onclick="doAction('play')">🎾 Play</button>
                        <button class="action-btn btn-study" onclick="doAction('study')">📖 Study</button>
                    </div>
                </div>

                <div class="status-tag" id="status-tag">● Idle · feeling good</div>

                <div class="study-screen" id="study-screen">
                    <div class="study-title">Pomodoro Timer</div>
                    <div class="study-phase" id="pomodoro-phase">Focus Session</div>
                    <div class="study-time" id="pomodoro-time">25:00</div>
                    <div class="study-controls">
                        <button class="study-btn" onclick="startPomodoro()">Start</button>
                        <button class="study-btn" onclick="pausePomodoro()">Pause</button>
                        <button class="study-btn" onclick="resetPomodoro()">Reset</button>
                    </div>
                    <button class="study-back-btn" onclick="exitStudyMode()">Back</button>
                </div>

            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
