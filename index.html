<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pochita — Your Study Buddy 🐣</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #d6eaff;
  --sky-deep: #aed4f5;
  --ground: #c8e6b0;
  --ground-dark: #a8cc90;
  --cloud: #ffffff;
  --night: #1a2540;
  --night2: #2a3a60;
  --star: #ffe57a;
  --body-col: #fde8c8;
  --cheek: #f5b8b8;
  --eye: #2e2418;
  --accent: #ff8fab;
  --btn-feed: #ffb347;
  --btn-play: #7ec8e3;
  --btn-study: #b8e0a8;
  --btn-sleep: #c9b8e8;
  --ink: #2e2418;
  --panel: rgba(255,255,255,0.85);
  --shadow: 0 8px 32px rgba(46,36,24,0.13);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #e8f4ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ── WIDGET SHELL ── */
.widget {
  width: 360px;
  border-radius: 32px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(46,36,24,0.20), 0 2px 0 rgba(255,255,255,0.8) inset;
  position: relative;
  user-select: none;
}

/* ── SCENE / SKY ── */
.scene {
  width: 100%;
  height: 220px;
  background: linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 100%);
  position: relative;
  overflow: hidden;
  transition: background 1.5s ease;
}

.scene.night {
  background: linear-gradient(180deg, var(--night) 0%, var(--night2) 100%);
}

/* ground */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: var(--ground);
  border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  transition: background 1.5s;
}
.scene.night .ground { background: #3a5030; }

.ground-stripe {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 12px;
  background: var(--ground-dark);
  border-radius: 50% 50% 0 0 / 8px 8px 0 0;
  transition: background 1.5s;
}
.scene.night .ground-stripe { background: #2a3c22; }

/* clouds */
.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.85;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.c1 { width:70px; height:22px; top:28px; left:30px; animation: drift 18s linear infinite; }
.c1::before { width:30px; height:30px; top:-16px; left:10px; }
.c1::after  { width:22px; height:22px; top:-12px; left:30px; }

.c2 { width:50px; height:16px; top:55px; right:40px; animation: drift 25s linear infinite reverse; opacity:0.6; }
.c2::before { width:22px; height:22px; top:-12px; left:6px; }
.c2::after  { width:16px; height:16px; top:-9px; left:22px; }

.scene.night .cloud { display: none; }

@keyframes drift {
  from { transform: translateX(-120px); }
  to   { transform: translateX(420px); }
}

/* stars */
.stars { position:absolute; inset:0; pointer-events:none; opacity:0; transition: opacity 1.5s; }
.scene.night .stars { opacity:1; }
.star {
  position:absolute;
  width:3px; height:3px;
  background: var(--star);
  border-radius:50%;
  animation: twinkle 2s ease-in-out infinite;
}
.star:nth-child(2) { animation-delay:.4s; }
.star:nth-child(3) { animation-delay:.8s; }
.star:nth-child(4) { animation-delay:1.2s; }
.star:nth-child(5) { animation-delay:1.6s; }

@keyframes twinkle {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.3; transform:scale(0.6); }
}

/* moon */
.moon {
  position:absolute;
  top:18px; right:24px;
  width:32px; height:32px;
  border-radius:50%;
  background: var(--star);
  box-shadow: 0 0 20px rgba(255,229,122,0.5);
  opacity:0;
  transition: opacity 1.5s;
}
.scene.night .moon { opacity:1; }

/* sun */
.sun {
  position:absolute;
  top:16px; right:26px;
  width:28px; height:28px;
  border-radius:50%;
  background: #FFD166;
  box-shadow: 0 0 24px rgba(255,209,102,0.6);
  opacity:1;
  transition: opacity 1.5s;
}
.scene.night .sun { opacity:0; }

/* ── PET ── */
.pet-wrap {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}

.pet {
  width: 90px;
  height: 90px;
  position: relative;
  animation: bob 2.4s ease-in-out infinite;
  filter: drop-shadow(0 6px 12px rgba(46,36,24,0.18));
}

@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.pet.eating { animation: chomp 0.3s ease-in-out infinite alternate; }
@keyframes chomp { from { transform:scaleY(1); } to { transform:scaleY(0.92) scaleX(1.05); } }

.pet.playing { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.pet.sleeping { animation: snooze 3s ease-in-out infinite; }
@keyframes snooze { 0%,100% { transform:rotate(-4deg) translateY(2px); } 50% { transform:rotate(4deg) translateY(2px); } }

.pet.studying { animation: nod 1s ease-in-out infinite; }
@keyframes nod { 0%,100% { transform:translateY(0) rotate(0); } 50% { transform:translateY(-2px) rotate(-5deg); } }

.pet.happy { animation: bounce 0.4s ease-in-out infinite alternate; }
@keyframes bounce { from { transform:translateY(0) scale(1); } to { transform:translateY(-10px) scale(1.05); } }

/* SVG pet body */
.pet svg { width:90px; height:90px; }

/* speech bubble */
.bubble {
  position: absolute;
  bottom: 106px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border-radius: 16px;
  padding: 8px 14px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(46,36,24,0.12);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  transform: translateX(-50%) translateY(6px);
  z-index: 5;
}
.bubble.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.bubble::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: white;
}

/* zzz particles */
.zzz {
  position:absolute;
  font-size: 14px;
  font-weight: 800;
  color: var(--btn-sleep);
  opacity:0;
  pointer-events:none;
}
.zzz.show { animation: floatZzz 2s ease-out forwards; }
@keyframes floatZzz {
  0%   { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(20px,-40px) scale(0.5); }
}

/* hearts */
.heart-particle {
  position: absolute;
  font-size: 16px;
  opacity:0;
  pointer-events:none;
  animation: heartFloat 1s ease-out forwards;
}
@keyframes heartFloat {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-50px) scale(1.4); }
}

/* ── PANEL BELOW ── */
.panel {
  background: var(--panel);
  backdrop-filter: blur(12px);
  padding: 18px 20px 22px;
}

/* name + level */
.pet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.pet-name {
  font-size: 22px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.5px;
}

.pet-name span {
  font-size: 13px;
  font-weight: 600;
  color: #aaa;
  margin-left: 6px;
  letter-spacing: 0;
}

.level-badge {
  background: var(--accent);
  color: white;
  font-size: 11.5px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

/* STAT BARS */
.stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-icon { font-size: 15px; width: 20px; text-align: center; }

.stat-label {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--ink);
  width: 46px;
  letter-spacing: 0.02em;
}

.bar-track {
  flex: 1;
  height: 9px;
  background: #eee;
  border-radius: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
}

.bar-fill.hunger  { background: linear-gradient(90deg, #ffb347, #ff8c42); }
.bar-fill.happy   { background: linear-gradient(90deg, #ff8fab, #ff6b9d); }
.bar-fill.energy  { background: linear-gradient(90deg, #7ec8e3, #4ab0d4); }
.bar-fill.focus   { background: linear-gradient(90deg, #b8e0a8, #7ec870); }

.stat-val {
  font-size: 11px;
  font-weight: 700;
  color: #bbb;
  width: 28px;
  text-align: right;
}

/* ACTION BUTTONS */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.action-btn {
  border: none;
  border-radius: 16px;
  padding: 12px 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  box-shadow: 0 3px 0 rgba(0,0,0,0.10);
  letter-spacing: 0.02em;
}

.action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(0,0,0,0.10); }
.action-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.10); }
.action-btn:disabled { filter: grayscale(0.5) opacity(0.6); cursor: default; transform: none; }

.btn-feed  { background: #ffe0aa; color: #b06000; }
.btn-play  { background: #c8eef8; color: #1a7a9a; }
.btn-study { background: #d4f0c4; color: #3a7a24; }
.btn-sleep { background: #e0d4f8; color: #5a3a9a; }

/* status tag */
.status-tag {
  text-align: center;
  margin-top: 14px;
  font-size: 12px;
  font-weight: 700;
  color: #bbb;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* xp bar */
.xp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.xp-label { font-size: 11px; font-weight: 700; color: #bbb; width: 24px; }
.xp-track { flex:1; height:6px; background:#eee; border-radius:3px; overflow:hidden; }
.xp-fill { height:100%; background: linear-gradient(90deg, #ffb347, #ff8fab); border-radius:3px; transition: width 0.8s cubic-bezier(.34,1.56,.64,1); }
.xp-next { font-size:11px; font-weight:700; color:#bbb; }

</style>
</head>
<body>

<div class="widget">

  <!-- SCENE -->
  <div class="scene" id="scene">

    <div class="sun"></div>
    <div class="moon"></div>

    <div class="stars">
      <div class="star" style="top:15%;left:12%"></div>
      <div class="star" style="top:25%;left:55%"></div>
      <div class="star" style="top:10%;left:75%"></div>
      <div class="star" style="top:40%;left:30%"></div>
      <div class="star" style="top:30%;left:85%"></div>
    </div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <!-- PET -->
    <div class="pet-wrap">
      <div class="bubble" id="bubble">Hello! 👋</div>

      <div class="pet" id="pet" onclick="petTap()">
        <!-- Cute round SVG cat/blob pet -->
        <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
          <!-- ears -->
          <ellipse cx="24" cy="22" rx="10" ry="13" fill="#f5d0a0" transform="rotate(-15 24 22)"/>
          <ellipse cx="66" cy="22" rx="10" ry="13" fill="#f5d0a0" transform="rotate(15 66 22)"/>
          <ellipse cx="24" cy="22" rx="5" ry="8" fill="#f5b8b8" transform="rotate(-15 24 22)"/>
          <ellipse cx="66" cy="22" rx="5" ry="8" fill="#f5b8b8" transform="rotate(15 66 22)"/>
          <!-- body -->
          <ellipse cx="45" cy="52" rx="32" ry="30" fill="#fde8c8"/>
          <!-- cheeks -->
          <ellipse cx="26" cy="57" rx="8" ry="5" fill="#f5b8b8" opacity="0.6"/>
          <ellipse cx="64" cy="57" rx="8" ry="5" fill="#f5b8b8" opacity="0.6"/>
          <!-- eyes -->
          <g id="eyes-normal">
            <circle cx="34" cy="48" r="5.5" fill="#2e2418"/>
            <circle cx="56" cy="48" r="5.5" fill="#2e2418"/>
            <circle cx="36" cy="46" r="1.8" fill="white"/>
            <circle cx="58" cy="46" r="1.8" fill="white"/>
          </g>
          <!-- sleep eyes (hidden by default) -->
          <g id="eyes-sleep" display="none">
            <path d="M29 48 Q34 44 39 48" stroke="#2e2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M51 48 Q56 44 61 48" stroke="#2e2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>
          <!-- happy eyes (hidden) -->
          <g id="eyes-happy" display="none">
            <path d="M29 50 Q34 43 39 50" stroke="#2e2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M51 50 Q56 43 61 50" stroke="#2e2418" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>
          <!-- nose -->
          <ellipse cx="45" cy="55" rx="2.5" ry="1.8" fill="#e8a0a0"/>
          <!-- mouth -->
          <path id="mouth-normal" d="M40 60 Q45 65 50 60" stroke="#e8a0a0" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path id="mouth-sad" d="M40 63 Q45 59 50 63" stroke="#e8a0a0" stroke-width="2" fill="none" stroke-linecap="round" display="none"/>
          <!-- study glasses -->
          <g id="glasses" display="none" opacity="0.85">
            <rect x="27" y="43" width="16" height="12" rx="5" fill="none" stroke="#888" stroke-width="1.8"/>
            <rect x="47" y="43" width="16" height="12" rx="5" fill="none" stroke="#888" stroke-width="1.8"/>
            <line x1="43" y1="49" x2="47" y2="49" stroke="#888" stroke-width="1.8"/>
          </g>
          <!-- tail -->
          <path d="M73 65 Q88 50 80 42" stroke="#f5c890" stroke-width="7" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- zzz particles (positioned relative to scene) -->
      <div class="zzz" id="zzz1" style="right:30px;bottom:120px;">z</div>
      <div class="zzz" id="zzz2" style="right:20px;bottom:140px;">zz</div>
    </div>

    <div class="ground"><div class="ground-stripe"></div></div>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <div class="pet-header">
      <div class="pet-name"> Pochita <span> Chainsaw Devil </span></div>
      <div class="level-badge" id="level-badge">✦ LVL 0</div>
    </div>

    <!-- XP -->
    <div class="xp-row">
      <div class="xp-label">XP</div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:45%"></div></div>
      <div class="xp-next" id="xp-text">45/100</div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-row">
        <div class="stat-icon">🍪</div>
        <div class="stat-label">Hunger</div>
        <div class="bar-track"><div class="bar-fill hunger" id="bar-hunger" style="width:60%"></div></div>
        <div class="stat-val" id="val-hunger">60</div>
      </div>
      <div class="stat-row">
        <div class="stat-icon">💖</div>
        <div class="stat-label">Happy</div>
        <div class="bar-track"><div class="bar-fill happy" id="bar-happy" style="width:75%"></div></div>
        <div class="stat-val" id="val-happy">75</div>
      </div>
      <div class="stat-row">
        <div class="stat-icon">⚡</div>
        <div class="stat-label">Energy</div>
        <div class="bar-track"><div class="bar-fill energy" id="bar-energy" style="width:80%"></div></div>
        <div class="stat-val" id="val-energy">80</div>
      </div>
      <div class="stat-row">
        <div class="stat-icon">📚</div>
        <div class="stat-label">Focus</div>
        <div class="bar-track"><div class="bar-fill focus" id="bar-focus" style="width:50%"></div></div>
        <div class="stat-val" id="val-focus">50</div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="action-btn btn-feed"  onclick="doAction('feed')">🍪 Feed</button>
      <button class="action-btn btn-play"  onclick="doAction('play')">🎾 Play</button>
      <button class="action-btn btn-study" onclick="doAction('study')">📖 Study</button>
      <button class="action-btn btn-sleep" onclick="doAction('sleep')">🌙 Sleep</button>
    </div>

    <div class="status-tag" id="status-tag">● Idle · feeling good</div>

  </div>
</div>

<script>
const state = {
  hunger: 60, happy: 75, energy: 80, focus: 50,
  xp: 45, xpMax: 100, level: 3,
  mood: 'idle', // idle, eating, playing, studying, sleeping, happy
  isBusy: false,
  tapCount: 0
};

const messages = {
  idle:     ["I'm bored... 🥺", "Pet me! 🐾", "Wanna study together? 📚", "Can I have a snack? 🍪"],
  hungry:   ["Feed me please! 😿", "My tummy's rumbling... 🍽️", "Cookie? 🍪"],
  tired:    ["So sleepy... 😴", "Need a nap... 💤", "Zzzz..."],
  sad:      ["I feel lonely 😢", "Play with me? 🎾", "Cheer me up? 💔"],
  eating:   ["Nom nom nom! 😋", "Yummy!! ✨", "More please! 🍪"],
  playing:  ["Wheee!! 🎉", "This is SO fun! 🎾", "Yay yay yay! ⭐"],
  studying: ["Learning hard! 🧠", "Almost got it...📖", "Focus focus... 🎯"],
  sleeping: ["zzz... 💤", "Dreaming of fish... 🐟", "Do not disturb! 🌙"],
  happy:    ["I love you!! 💖", "Best day ever! ✨", "Squeee! 🌸"],
  levelup:  ["I LEVELED UP!! 🎊", "Look at me grow! ⭐", "Woohoo!! 🎉"]
};

function setStat(name, val) {
  val = Math.max(0, Math.min(100, val));
  state[name] = val;
  document.getElementById('bar-' + name).style.width = val + '%';
  document.getElementById('val-' + name).textContent = Math.round(val);
}

function showBubble(text, duration = 2200) {
  const b = document.getElementById('bubble');
  b.textContent = text;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), duration);
}

function randomOf(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function setAnimation(anim) {
  const pet = document.getElementById('pet');
  pet.className = 'pet' + (anim ? ' ' + anim : '');
}

function setEyes(type) {
  document.getElementById('eyes-normal').style.display = type === 'normal' ? '' : 'none';
  document.getElementById('eyes-sleep').style.display  = type === 'sleep'  ? '' : 'none';
  document.getElementById('eyes-happy').style.display  = type === 'happy'  ? '' : 'none';
}

function setMouth(type) {
  document.getElementById('mouth-normal').style.display = type === 'normal' ? '' : 'none';
  document.getElementById('mouth-sad').style.display    = type === 'sad'    ? '' : 'none';
}

function setGlasses(show) {
  document.getElementById('glasses').style.display = show ? '' : 'none';
}

function setScene(night) {
  document.getElementById('scene').classList.toggle('night', night);
}

function spawnHeart() {
  const scene = document.getElementById('scene');
  const h = document.createElement('div');
  h.className = 'heart-particle';
  h.textContent = ['💖','✨','🌸','⭐'][Math.floor(Math.random()*4)];
  h.style.left = (30 + Math.random()*30) + '%';
  h.style.bottom = '80px';
  scene.appendChild(h);
  setTimeout(() => h.remove(), 1000);
}

function addXP(amount) {
  state.xp += amount;
  if (state.xp >= state.xpMax) {
    state.xp -= state.xpMax;
    state.level++;
    document.getElementById('level-badge').textContent = '✦ LVL ' + state.level;
    state.xpMax = Math.round(state.xpMax * 1.3);
    setTimeout(() => {
      showBubble(randomOf(messages.levelup), 3000);
      setAnimation('happy');
      setEyes('happy');
      for (let i = 0; i < 5; i++) setTimeout(spawnHeart, i * 200);
    }, 300);
  }
  document.getElementById('xp-fill').style.width = (state.xp / state.xpMax * 100) + '%';
  document.getElementById('xp-text').textContent = state.xp + '/' + state.xpMax;
}

function updateStatusTag(text) {
  document.getElementById('status-tag').textContent = text;
}

function setButtonsDisabled(val) {
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = val);
}

function doAction(action) {
  if (state.isBusy) return;
  state.isBusy = true;
  setButtonsDisabled(true);

  if (action === 'feed') {
    setAnimation('eating');
    setEyes('happy');
    setGlasses(false);
    showBubble(randomOf(messages.eating), 2000);
    updateStatusTag('🍪 Eating a snack...');
    setStat('hunger', state.hunger + 30);
    setStat('happy',  state.happy  + 10);
    addXP(8);
    setTimeout(endAction, 2200);

  } else if (action === 'play') {
    setAnimation('playing');
    setEyes('happy');
    setGlasses(false);
    setScene(false);
    showBubble(randomOf(messages.playing), 2500);
    updateStatusTag('🎾 Playing around!');
    setStat('happy',  state.happy  + 25);
    setStat('energy', state.energy - 15);
    setStat('hunger', state.hunger - 10);
    for (let i = 0; i < 3; i++) setTimeout(spawnHeart, i * 400);
    addXP(12);
    setTimeout(endAction, 2800);

  } else if (action === 'study') {
    setAnimation('studying');
    setEyes('normal');
    setGlasses(true);
    showBubble(randomOf(messages.studying), 3000);
    updateStatusTag('📖 Studying hard...');
    setStat('focus',  state.focus  + 30);
    setStat('energy', state.energy - 10);
    setStat('hunger', state.hunger - 8);
    addXP(20);
    setTimeout(endAction, 3200);

  } else if (action === 'sleep') {
    setAnimation('sleeping');
    setEyes('sleep');
    setGlasses(false);
    setScene(true);
    showBubble(randomOf(messages.sleeping), 3500);
    updateStatusTag('💤 Taking a nap...');
    setStat('energy', state.energy + 40);
    setStat('hunger', state.hunger - 5);
    // animate zzz
    ['zzz1','zzz2'].forEach((id, i) => {
      const el = document.getElementById(id);
      setTimeout(() => {
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1800);
      }, i * 700);
    });
    addXP(5);
    setTimeout(() => { setScene(false); endAction(); }, 4000);
  }
}

function endAction() {
  state.isBusy = false;
  setButtonsDisabled(false);
  setGlasses(false);

  // decide idle look based on stats
  if (state.happy < 30) {
    setAnimation('');
    setEyes('normal');
    setMouth('sad');
    updateStatusTag('😢 Feeling lonely...');
  } else if (state.energy < 20) {
    setAnimation('');
    setEyes('sleep');
    setMouth('normal');
    updateStatusTag('😴 Really sleepy...');
  } else {
    setAnimation('');
    setEyes('normal');
    setMouth('normal');
    updateStatusTag('● Idle · feeling good');
  }
}

function petTap() {
  if (state.isBusy) return;
  state.tapCount++;
  spawnHeart();
  setStat('happy', state.happy + 5);

  if (state.tapCount % 5 === 0) {
    setAnimation('happy');
    setEyes('happy');
    showBubble(randomOf(messages.happy), 2000);
    addXP(3);
    setTimeout(() => { setAnimation(''); setEyes('normal'); }, 2200);
  } else {
    showBubble(randomOf(messages.idle), 1800);
  }
}

// passive decay every 30s
setInterval(() => {
  if (!state.isBusy) {
    setStat('hunger', state.hunger - 3);
    setStat('happy',  state.happy  - 2);
    setStat('energy', state.energy - 1);
  }
}, 30000);

// idle chatter every 15s
setInterval(() => {
  if (!state.isBusy) {
    let pool = messages.idle;
    if (state.hunger < 30) pool = messages.hungry;
    else if (state.energy < 30) pool = messages.tired;
    else if (state.happy < 30) pool = messages.sad;
    showBubble(randomOf(pool), 2000);
  }
}, 15000);
</script>
